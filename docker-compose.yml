version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"  # API
      - "9999:9999"  # Socket
    volumes:
      - ./backend:/app
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/temperature.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: